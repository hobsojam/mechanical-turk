<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mechanical Turk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --radius: 8px;
      --font: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.6;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    #ws-status {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #ws-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }

    #ws-dot.connected { background: var(--green); }

    #agents {
      font-size: 11px;
      color: var(--muted);
    }

    #help-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--muted);
      font-family: var(--font);
      font-size: 11px;
      width: 22px;
      height: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #help-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: min(680px, 92vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #modal-header span {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }

    #modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
    }

    #modal-close:hover { color: var(--text); }

    #modal-body {
      overflow-y: auto;
      padding: 18px;
      font-size: 13px;
      line-height: 1.7;
    }

    /* Basic markdown rendering */
    #modal-body h1 { font-size: 16px; color: var(--accent); margin-bottom: 12px; }
    #modal-body h2 { font-size: 13px; color: var(--text); margin: 18px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    #modal-body p  { color: var(--muted); margin-bottom: 10px; }
    #modal-body strong { color: var(--text); }
    #modal-body ul { padding-left: 18px; margin-bottom: 10px; }
    #modal-body li { color: var(--muted); margin-bottom: 4px; }
    #modal-body li strong { color: var(--text); }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left: pending inbox */
    #inbox {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .panel-header {
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #questions {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      margin-top: 48px;
      font-size: 12px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: slide-in 0.15s ease;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-meta {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .agent-badge {
      font-size: 10px;
      background: #1c2d42;
      color: var(--accent);
      border: 1px solid #1f4070;
      border-radius: 4px;
      padding: 1px 6px;
    }

    .timestamp {
      font-size: 10px;
      color: var(--muted);
      margin-left: auto;
    }

    .question-text {
      color: var(--text);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .answer-row {
      display: flex;
      gap: 8px;
    }

    .answer-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 6px 10px;
      resize: none;
      min-height: 36px;
      max-height: 120px;
      overflow-y: auto;
    }

    .answer-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .send-btn {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 6px;
      padding: 0 14px;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
      height: 36px;
      white-space: nowrap;
    }

    .send-btn:hover { background: #79c0ff; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Right: activity log */
    #log-panel {
      width: 320px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .log-entry {
      font-size: 11px;
      color: var(--muted);
      border-left: 2px solid var(--border);
      padding-left: 8px;
      animation: fade-in 0.2s ease;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .log-entry.answered  { border-color: var(--green); color: var(--text); }
    .log-entry.connected { border-color: var(--accent); }
    .log-entry.disconnected { border-color: var(--red); }
    .log-entry.notification { border-color: var(--yellow); color: var(--text); }
    .log-entry.dropped   { border-color: var(--red); }

    .log-time { color: var(--muted); margin-right: 6px; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>mechanical-turk</h1>
  <div id="ws-status">
    <span id="ws-dot"></span>
    <span id="ws-label">connecting…</span>
  </div>
  <div id="agents">0 agents</div>
  <button id="help-btn" title="Operator guide">?</button>
</header>

<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header">
      <span>Operator Guide</span>
      <button id="modal-close">&times;</button>
    </div>
    <div id="modal-body">Loading…</div>
  </div>
</div>

<main>
  <section id="inbox">
    <div class="panel-header">Inbox</div>
    <div id="questions">
      <p class="empty" id="empty-msg">Waiting for AI agents to connect…</p>
    </div>
  </section>

  <section id="log-panel">
    <div class="panel-header">Activity</div>
    <div id="log"></div>
  </section>
</main>

<script>
  const dot = document.getElementById('ws-dot');
  const wsLabel = document.getElementById('ws-label');
  const agentsEl = document.getElementById('agents');
  const questionsEl = document.getElementById('questions');
  const emptyMsg = document.getElementById('empty-msg');
  const logEl = document.getElementById('log');

  let agentCount = 0;

  function setStatus(connected) {
    dot.className = connected ? 'connected' : '';
    wsLabel.textContent = connected ? 'connected' : 'reconnecting…';
  }

  function updateAgentCount(delta) {
    agentCount = Math.max(0, agentCount + delta);
    agentsEl.textContent = `${agentCount} agent${agentCount !== 1 ? 's' : ''}`;
  }

  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function addLog(text, cls = '') {
    const entry = document.createElement('div');
    entry.className = `log-entry ${cls}`;
    entry.innerHTML = `<span class="log-time">${now()}</span>${text}`;
    logEl.prepend(entry);
    // Keep log manageable
    while (logEl.children.length > 200) logEl.lastChild.remove();
  }

  function updateEmpty() {
    emptyMsg.style.display = questionsEl.children.length <= 1 ? 'block' : 'none';
  }

  function addQuestionCard(q) {
    emptyMsg.style.display = 'none';

    const card = document.createElement('div');
    card.className = 'question-card';
    card.dataset.id = q.id;

    const ts = new Date(q.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    card.innerHTML = `
      <div class="card-meta">
        <span class="agent-badge">${q.agentId}</span>
        <span class="timestamp">${ts}</span>
      </div>
      <div class="question-text">${escHtml(q.question)}</div>
      <div class="answer-row">
        <textarea class="answer-input" placeholder="Type your answer… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
        <button class="send-btn">Send</button>
      </div>
    `;

    const input = card.querySelector('.answer-input');
    const btn = card.querySelector('.send-btn');

    function submit() {
      const answer = input.value.trim();
      if (!answer) return;
      btn.disabled = true;
      input.disabled = true;
      ws.send(JSON.stringify({ type: 'answer', id: q.id, answer }));
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submit();
      }
      // Auto-grow textarea
      setTimeout(() => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      }, 0);
    });

    btn.addEventListener('click', submit);

    questionsEl.insertBefore(card, questionsEl.firstChild);
    input.focus();
  }

  function removeQuestion(id, logText, logCls) {
    const card = questionsEl.querySelector(`[data-id="${id}"]`);
    if (card) {
      card.style.opacity = '0';
      card.style.transition = 'opacity 0.2s';
      setTimeout(() => { card.remove(); updateEmpty(); }, 200);
    }
    if (logText) addLog(logText, logCls);
  }

  function escHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // WebSocket with auto-reconnect
  let ws;

  function connect() {
    ws = new WebSocket(`ws://${location.host}`);

    ws.onopen = () => setStatus(true);

    ws.onclose = () => {
      setStatus(false);
      setTimeout(connect, 2000);
    };

    ws.onmessage = ({ data }) => {
      let msg;
      try { msg = JSON.parse(data); } catch { return; }

      switch (msg.type) {
        case 'init':
          questionsEl.querySelectorAll('.question-card').forEach(c => c.remove());
          agentCount = 0;
          (msg.questions ?? []).forEach(addQuestionCard);
          updateEmpty();
          break;

        case 'question':
          addQuestionCard(msg);
          addLog(`<b>${msg.agentId}</b> asked a question`);
          break;

        case 'answered':
          removeQuestion(msg.id,
            `<b>${msg.agentId}</b> received answer`,
            'answered');
          break;

        case 'dropped':
          removeQuestion(msg.id,
            `Question from <b>${msg.agentId}</b> dropped (agent disconnected)`,
            'dropped');
          break;

        case 'agent_connected':
          updateAgentCount(+1);
          addLog(`<b>${msg.agentId}</b> connected`, 'connected');
          break;

        case 'agent_disconnected':
          updateAgentCount(-1);
          addLog(`<b>${msg.agentId}</b> disconnected`, 'disconnected');
          break;

        case 'notification':
          addLog(`<b>${msg.agentId}</b>: ${escHtml(msg.message)}`, 'notification');
          break;
      }
    };
  }

  connect();

  // Help modal
  const overlay = document.getElementById('modal-overlay');
  const modalBody = document.getElementById('modal-body');
  let helpContent = null;

  function renderMarkdown(md) {
    return md
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, (m) => `<ul>${m}</ul>`)
      .replace(/\n{2,}/g, '</p><p>')
      .replace(/^(?!<[hul])/gm, '')
      .replace(/(<\/h[12]>|<\/ul>)/g, '$1')
      .trim();
  }

  document.getElementById('help-btn').addEventListener('click', async () => {
    overlay.classList.add('open');
    if (!helpContent) {
      try {
        const res = await fetch('/human.md');
        const text = await res.text();
        helpContent = renderMarkdown(text);
      } catch {
        helpContent = '<p>Could not load operator guide.</p>';
      }
    }
    modalBody.innerHTML = helpContent;
  });

  document.getElementById('modal-close').addEventListener('click', () => {
    overlay.classList.remove('open');
  });

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('open');
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') overlay.classList.remove('open');
  });
</script>
</body>
</html>
